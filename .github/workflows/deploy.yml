name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  pages: write
  id-token: write
  contents: read

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate config.js
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          TMDB_READ_TOKEN: ${{ secrets.TMDB_READ_TOKEN }}
        run: |
          printf 'export const SUPABASE_URL = "%s";\n' "$SUPABASE_URL" > config.js
          printf 'export const SUPABASE_ANON_KEY = "%s";\n' "$SUPABASE_ANON_KEY" >> config.js
          printf 'export const TMDB_READ_TOKEN = "%s";\n' "$TMDB_READ_TOKEN" >> config.js

      - name: Debug config.js
        run: cat config.js

      - name: Configure Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
